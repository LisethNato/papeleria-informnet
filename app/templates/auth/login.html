{% extends 'base.html' %}

{% block contenido %}
<h1>Iniciar sesión</h1>

<form method="POST">
    <label>Correo:</label>
    <input type="email" name="email" required>

    <label>Contraseña:</label>
    <input type="password" name="password" required>

    <button type="submit">Entrar</button>
</form>
{% endblock %}
