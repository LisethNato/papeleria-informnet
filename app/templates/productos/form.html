{% extends 'base.html' %}

{% block contenido %}
<h1>{{ 'Editar' if producto else 'Nuevo' }} producto</h1>

<form method="POST">
    <label>Nombre:</label>
    <input type="text" name="nombre" value="{{ producto.nombre if producto else '' }}" required>

    <label>Descripción:</label>
    <input type="text" name="descripcion" value="{{ producto.descripcion if producto else '' }}">

    <label>Precio:</label>
    <input type="number" step="0.01" name="precio" value="{{ producto.precio if producto else '' }}" required>

    <label>Stock:</label>
    <input type="number" name="stock" value="{{ producto.stock if producto else '' }}" required>

    <button type="submit">Guardar</button>
</form>
{% endblock %}
