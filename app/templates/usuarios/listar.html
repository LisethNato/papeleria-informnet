{% extends 'base.html' %}

{% block contenido %}
<h1>Roles1</h1>

<a href="{{ url_for('usuarios.crear') }}" class="btn-nuevo-usuario">
    + Nuevo Usuario
</a>

<table border="1">
    <tr>
        <th>Nombre</th>
        <th>Email</th>
        <th>Rol</th>
        <th>Acciones</th>
    </tr>
    {% for u in usuarios %}
    <tr>
        <td>{{ u.nombre }}</td>
        <td>{{ u.email }}</td>
        <td>{{ u.rol }}</td>
        <td>
            <a href="{{ url_for('usuarios.editar', id=u.id) }}">Editar</a>
            {% if u.id != current_user.id %}
            <form action="{{ url_for('usuarios.eliminar', id=u.id) }}" method="POST" style="display:inline;">
                <button type="submit" onclick="return confirm('¿Eliminar este usuario?')">Eliminar</button>
            </form>
            {% endif %}
        </td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
